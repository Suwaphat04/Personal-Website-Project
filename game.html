<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="game.html">Game</a>
  <a href="cv.html">CV</a>
</nav>

<div class="container">
  <h1>🎮 Click the Box Game</h1>

  <div class="info">
    <p>Score: <span id="score">0</span></p>
    <p>Time: <span id="time">10</span></p>
  </div>

  <div id="gameArea"></div>

  <button onclick="startGame()" class="btn">Start Game</button>
</div>

<!-- Popup -->
<div id="gameOverModal" class="modal">
  <div class="modal-content">
    <h2>🎮 Game Over</h2>
    <p>Your Score: <span id="finalScore"></span></p>
    <p>High Score: <span id="highScore"></span></p>
    <button onclick="restartGame()" class="btn">Play Again</button>
    <button onclick="exitGame()" class="btn exit">Exit</button>
</div>

  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
